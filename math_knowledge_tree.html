<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>STEM Math Tree</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #050810;
  --surface: #0c1120;
  --card: #111827;
  --border: #1e293b;
  --text: #e2e8f0;
  --muted: #64748b;
  --faint: #1e293b;

  --stem: #06b6d4;
  --cs:   #8b5cf6;
  --ai:   #f59e0b;
  --math: #10b981;

  --locked: #1e293b;
  --done: #10b981;
  --active: #06b6d4;
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
}

/* ── TOP NAV ── */
.topnav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  height: 56px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  flex-shrink: 0;
  gap: 12px;
  z-index: 100;
}
.nav-logo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 22px;
  letter-spacing: 2px;
  background: linear-gradient(90deg, var(--stem), var(--cs));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  white-space: nowrap;
  flex-shrink: 0;
}
.nav-filters {
  display: flex;
  gap: 4px;
  overflow-x: auto;
  -ms-overflow-style: none;
  scrollbar-width: none;
}
.nav-filters::-webkit-scrollbar{display:none;}
.filter-btn {
  padding: 5px 12px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted);
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 1px;
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.2s;
}
.filter-btn.active { color: var(--text); }
.filter-btn[data-f="all"].active { border-color: var(--text); background: var(--border); }
.filter-btn[data-f="stem"].active { border-color: var(--stem); background: #06b6d410; color: var(--stem); }
.filter-btn[data-f="cs"].active { border-color: var(--cs); background: #8b5cf610; color: var(--cs); }
.filter-btn[data-f="ai"].active { border-color: var(--ai); background: #f59e0b10; color: var(--ai); }
.nav-xp {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--ai);
  white-space: nowrap;
  flex-shrink: 0;
}

/* ── LAYOUT ── */
.layout {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* ── TREE PANEL ── */
.tree-panel {
  width: 100%;
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 24px 16px 60px;
  scroll-behavior: smooth;
}
.tree-panel::-webkit-scrollbar{width:4px;}
.tree-panel::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

/* ── LESSON PANEL ── */
.lesson-panel {
  width: 0;
  flex-shrink: 0;
  overflow: hidden;
  background: var(--surface);
  border-left: 1px solid var(--border);
  transition: width 0.3s cubic-bezier(0.4,0,0.2,1);
  display: flex;
  flex-direction: column;
}
.lesson-panel.open {
  width: min(440px, 100vw);
}
@media (max-width: 700px) {
  .lesson-panel.open {
    position: fixed;
    inset: 56px 0 0 0;
    width: 100vw;
    z-index: 200;
  }
}
.lesson-inner {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
}
.lesson-inner::-webkit-scrollbar{width:3px;}
.lesson-inner::-webkit-scrollbar-thumb{background:var(--border);}

/* ── CHAPTER LABELS ── */
.chapter-label {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 13px;
  letter-spacing: 4px;
  color: var(--muted);
  text-align: center;
  margin: 28px 0 16px;
  position: relative;
}
.chapter-label::before,.chapter-label::after {
  content:'';
  position:absolute;
  top:50%;
  width:22%;
  height:1px;
  background: var(--border);
}
.chapter-label::before{left:0;}
.chapter-label::after{right:0;}

/* ── NODE ROW ── */
.node-row {
  display: flex;
  justify-content: center;
  gap: 12px;
  margin-bottom: 0;
  flex-wrap: wrap;
  position: relative;
}

/* ── CONNECTOR LINE ── */
.connector {
  width: 2px;
  background: var(--border);
  margin: 0 auto;
  transition: background 0.3s;
}
.connector.lit { background: linear-gradient(to bottom, var(--c, var(--stem)), var(--border)); }

/* ── NODE ── */
.node {
  width: 100%;
  max-width: 340px;
  background: var(--card);
  border: 1.5px solid var(--border);
  border-radius: 14px;
  padding: 14px 16px;
  cursor: pointer;
  transition: all 0.22s;
  position: relative;
  overflow: hidden;
}
.node::before {
  content:'';
  position:absolute;
  left:0;top:0;bottom:0;
  width:3px;
  background: var(--c, var(--stem));
  opacity: 0;
  transition: opacity 0.2s;
}
.node:hover { border-color: color-mix(in srgb, var(--c, var(--stem)) 50%, transparent); transform: translateX(3px); }
.node:hover::before { opacity: 1; }
.node.active { border-color: var(--c, var(--stem)); background: color-mix(in srgb, var(--c, var(--stem)) 8%, var(--card)); }
.node.active::before { opacity: 1; }
.node.locked { opacity: 0.4; cursor: not-allowed; filter: grayscale(0.6); }
.node.locked:hover { transform: none; border-color: var(--border); }
.node.locked:hover::before { opacity: 0; }
.node.done { border-color: #10b98130; }
.node.done::before { background: var(--done); opacity: 0.6; }

.node-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  margin-bottom: 6px;
}
.node-icon {
  width: 32px; height: 32px;
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 15px;
  background: color-mix(in srgb, var(--c, var(--stem)) 15%, transparent);
  flex-shrink: 0;
}
.node-badges {
  display: flex; gap: 4px; flex-wrap: wrap; justify-content: flex-end;
}
.badge {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.5px;
  padding: 2px 7px;
  border-radius: 20px;
  border: 1px solid;
}
.badge-stem { color: var(--stem); border-color: #06b6d430; background: #06b6d408; }
.badge-cs   { color: var(--cs);   border-color: #8b5cf630; background: #8b5cf608; }
.badge-ai   { color: var(--ai);   border-color: #f59e0b30; background: #f59e0b08; }

.node-title {
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 3px;
  color: var(--text);
}
.node-desc {
  font-size: 12px;
  color: var(--muted);
  line-height: 1.5;
}
.node-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 10px;
  padding-top: 8px;
  border-top: 1px solid var(--faint);
}
.node-xp {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--ai);
}
.node-status {
  font-size: 10px;
  font-family: 'JetBrains Mono', monospace;
}
.status-locked { color: var(--muted); }
.status-ready  { color: var(--active); }
.status-done   { color: var(--done); }

/* ── LESSON PANEL CONTENT ── */
.lesson-close {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 14px 20px 0;
  flex-shrink: 0;
}
.lc-back {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--muted);
  font-size: 16px;
  cursor: pointer;
  width: 32px; height: 32px;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
}
.lc-back:hover { color: var(--text); border-color: var(--muted); }
.lc-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--muted);
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.l-hero {
  background: linear-gradient(135deg, color-mix(in srgb, var(--lc) 20%, var(--card)), var(--card));
  border: 1px solid color-mix(in srgb, var(--lc) 25%, transparent);
  border-radius: 12px;
  padding: 18px;
  margin-bottom: 18px;
}
.l-hero-icon { font-size: 28px; margin-bottom: 8px; display: block; }
.l-hero-title { font-family: 'Bebas Neue', sans-serif; font-size: 26px; letter-spacing: 1px; margin-bottom: 6px; }
.l-hero-desc { font-size: 13px; color: var(--muted); line-height: 1.6; }

.l-section { margin-bottom: 20px; }
.l-section-title {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 10px;
  padding-bottom: 6px;
  border-bottom: 1px solid var(--border);
}

.concept-block {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px;
  margin-bottom: 8px;
}
.concept-head {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 8px;
}
.concept-num {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--lc, var(--stem));
  background: color-mix(in srgb, var(--lc, var(--stem)) 12%, transparent);
  padding: 2px 8px;
  border-radius: 4px;
}
.concept-name { font-size: 13px; font-weight: 600; }
.concept-body { font-size: 13px; color: var(--muted); line-height: 1.7; }
.concept-body strong { color: var(--text); }
.concept-body code {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  background: var(--border);
  padding: 1px 6px;
  border-radius: 4px;
  color: var(--lc, var(--stem));
}

.formula-box {
  background: #0a0f1a;
  border: 1px solid var(--border);
  border-left: 3px solid var(--lc, var(--stem));
  border-radius: 0 8px 8px 0;
  padding: 12px 16px;
  margin: 10px 0;
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  color: var(--text);
  line-height: 1.8;
}
.formula-box .flabel {
  font-size: 9px;
  letter-spacing: 2px;
  color: var(--muted);
  text-transform: uppercase;
  margin-bottom: 6px;
  display: block;
}

.trick-pill {
  display: flex;
  gap: 8px;
  align-items: flex-start;
  background: color-mix(in srgb, var(--ai) 8%, var(--card));
  border: 1px solid color-mix(in srgb, var(--ai) 20%, transparent);
  border-radius: 8px;
  padding: 10px 12px;
  margin-top: 8px;
  font-size: 12.5px;
  line-height: 1.6;
  color: var(--muted);
}
.trick-pill strong { color: var(--ai); }
.trick-emoji { flex-shrink: 0; font-size: 14px; }

/* ── QUIZ ── */
.quiz-section { margin-top: 4px; }
.quiz-q {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px;
  margin-bottom: 8px;
}
.quiz-q-text { font-size: 14px; font-weight: 500; margin-bottom: 12px; line-height: 1.5; }
.quiz-options { display: flex; flex-direction: column; gap: 6px; }
.quiz-opt {
  padding: 10px 14px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--surface);
  font-size: 13px;
  cursor: pointer;
  transition: all 0.15s;
  text-align: left;
  color: var(--text);
}
.quiz-opt:hover:not([disabled]) { border-color: var(--lc, var(--stem)); background: color-mix(in srgb, var(--lc, var(--stem)) 8%, var(--surface)); }
.quiz-opt.correct { border-color: var(--done); background: #10b98115; color: #6ee7b7; }
.quiz-opt.wrong   { border-color: #ef444440; background: #ef444410; color: #fca5a5; }
.quiz-opt.reveal  { border-color: var(--done); color: #6ee7b7; }

.quiz-result {
  display: none;
  text-align: center;
  padding: 18px;
  border-radius: 10px;
  margin-top: 8px;
}
.quiz-result.show { display: block; }
.quiz-result.pass { background: #10b98112; border: 1px solid #10b98130; }
.quiz-result.fail { background: #ef444412; border: 1px solid #ef444430; }
.quiz-result-icon { font-size: 36px; margin-bottom: 8px; display: block; }
.quiz-result-text { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
.quiz-result-sub  { font-size: 12px; color: var(--muted); }

.complete-btn {
  width: 100%;
  background: var(--lc, var(--stem));
  color: #000;
  border: none;
  border-radius: 10px;
  padding: 14px;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  margin-top: 14px;
  transition: all 0.2s;
  display: none;
}
.complete-btn.show { display: block; }
.complete-btn:hover { filter: brightness(1.1); transform: translateY(-1px); }

/* ── PROGRESS BAR ── */
.progress-bar-wrap {
  height: 3px;
  background: var(--border);
  flex-shrink: 0;
}
.progress-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--stem), var(--cs));
  transition: width 0.6s ease;
}

/* ── XP TOAST ── */
.xp-toast {
  position: fixed;
  top: 70px;
  left: 50%;
  transform: translateX(-50%) translateY(-10px);
  background: var(--ai);
  color: #000;
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  font-weight: 600;
  padding: 8px 20px;
  border-radius: 100px;
  opacity: 0;
  transition: all 0.3s;
  pointer-events: none;
  z-index: 999;
  white-space: nowrap;
}
.xp-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── EMPTY STATE ── */
.empty-state {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  height: 100%; color: var(--muted); text-align: center; padding: 40px;
  font-size: 14px; gap: 12px;
}
.empty-state .big { font-size: 48px; }
</style>
</head>
<body>

<div class="xp-toast" id="xp-toast"></div>

<!-- TOP NAV -->
<div class="topnav">
  <div class="nav-logo">MATH TREE</div>
  <div class="nav-filters">
    <button class="filter-btn active" data-f="all" onclick="setFilter('all',this)">ALL</button>
    <button class="filter-btn" data-f="stem" onclick="setFilter('stem',this)">STEM</button>
    <button class="filter-btn" data-f="cs" onclick="setFilter('cs',this)">CS</button>
    <button class="filter-btn" data-f="ai" onclick="setFilter('ai',this)">AI/ML</button>
  </div>
  <div class="nav-xp">⚡ <span id="xp-count">0</span> XP</div>
</div>
<div class="progress-bar-wrap"><div class="progress-bar-fill" id="prog-bar" style="width:0%"></div></div>

<!-- LAYOUT -->
<div class="layout">

  <!-- TREE -->
  <div class="tree-panel" id="tree-panel">
    <!-- built by JS -->
  </div>

  <!-- LESSON -->
  <div class="lesson-panel" id="lesson-panel">
    <div class="lesson-close">
      <button class="lc-back" onclick="closeLesson()">←</button>
      <div class="lc-title" id="lc-title">Select a topic</div>
    </div>
    <div class="lesson-inner" id="lesson-inner">
      <div class="empty-state">
        <span class="big">🌳</span>
        <strong>Pick a node</strong>
        <span>Tap any topic in the tree to start learning</span>
      </div>
    </div>
  </div>

</div>

<script>
// ══════════════════════════════════════════
//  CURRICULUM DATA
// ══════════════════════════════════════════
const TREE = [
  {
    chapter: 'FOUNDATION',
    nodes: [
      {
        id:'numbers', icon:'🔢', title:'Number Systems', color:'var(--math)',
        fields:['stem','cs','ai'], xp:50, requires:[],
        desc:'Integers, rationals, reals — the language of everything.',
        concepts:[
          { name:'Natural & Integers', body:'Natural numbers ℕ = {0,1,2,3…}. Integers ℤ include negatives. Every counting problem starts here. <strong>Key property:</strong> integers are closed under addition, subtraction, and multiplication.' },
          { name:'Rational Numbers ℚ', body:'Any number expressible as <strong>p/q</strong> where p,q are integers and q≠0. Decimals either terminate (1/4=0.25) or repeat (1/3=0.333…). Density property: between any two rationals, another exists.' },
          { name:'Irrational & Real Numbers', body:'Numbers like <code>√2</code>, <code>π</code>, <code>e</code> cannot be expressed as fractions. Real numbers ℝ = rationals ∪ irrationals. They fill the "number line" completely.' },
          { name:'Number Bases', body:'Decimal (base 10) is human convention. <strong>Binary (base 2)</strong> is how computers think: 1011₂ = 8+2+1 = 11₁₀. Hexadecimal (base 16) compresses binary: 0xFF = 255.' },
        ],
        formulas:['Binary: 1101₂ = 1×2³ + 1×2² + 0×2¹ + 1×2⁰ = 13', 'Hex: A=10, B=11, …, F=15'],
        trick:'For base conversion, divide repeatedly by the base and read remainders bottom-up.',
        quiz:[
          { q:'What is 1010₂ in decimal?', opts:['8','10','12','6'], ans:1 },
          { q:'Which is irrational?', opts:['0.5','22/7','√2','1.333…'], ans:2 },
          { q:'ℤ includes:', opts:['only positives','positives & zero','positives, negatives & zero','only naturals'], ans:2 },
        ]
      },
      {
        id:'algebra_basics', icon:'📐', title:'Algebra Fundamentals', color:'var(--math)',
        fields:['stem','cs','ai'], xp:60, requires:['numbers'],
        desc:'Variables, equations, and the art of manipulation.',
        concepts:[
          { name:'Variables & Expressions', body:'A variable (x, y, n) is a placeholder for a number. An expression like <code>3x + 2</code> has no equals sign. An <strong>equation</strong> (3x+2=8) makes a claim that can be true or false.' },
          { name:'Solving Linear Equations', body:'Goal: isolate the variable. Use inverse operations. <strong>Balance rule:</strong> whatever you do to one side, do to the other. Example: 2x+5=13 → 2x=8 → x=4.' },
          { name:'Factoring', body:'Rewriting expressions as products. <code>x²+5x+6 = (x+2)(x+3)</code>. Key patterns: <strong>difference of squares</strong> a²−b²=(a+b)(a−b), <strong>perfect square</strong> (a+b)²=a²+2ab+b².' },
          { name:'Functions', body:'A function f(x) maps each input to exactly one output. Think of it as a machine: input x, output f(x). <strong>Domain</strong> = valid inputs, <strong>Range</strong> = possible outputs.' },
        ],
        formulas:['Quadratic: x = (−b ± √(b²−4ac)) / 2a','(a+b)² = a² + 2ab + b²','a²−b² = (a+b)(a−b)'],
        trick:'FOIL for (a+b)(c+d): First, Outer, Inner, Last. Then combine like terms.',
        quiz:[
          { q:'Solve: 3x − 4 = 11', opts:['x=3','x=5','x=7','x=4'], ans:1 },
          { q:'Factor: x²−9', opts:['(x−3)²','(x+3)(x−3)','(x−9)(x+1)','(x+9)(x−1)'], ans:1 },
          { q:'f(x)=2x+1. What is f(3)?', opts:['5','6','7','8'], ans:2 },
        ]
      },
    ]
  },
  {
    chapter: 'PRE-CALCULUS',
    nodes: [
      {
        id:'trig', icon:'📡', title:'Trigonometry', color:'var(--stem)',
        fields:['stem'], xp:70, requires:['algebra_basics'],
        desc:'Angles, waves, and periodic phenomena.',
        concepts:[
          { name:'Right Triangle Trig', body:'For a right triangle: <strong>sin θ = opposite/hypotenuse</strong>, cos θ = adjacent/hypotenuse, tan θ = opposite/adjacent. Mnemonic: <code>SOH-CAH-TOA</code>.' },
          { name:'Unit Circle', body:'A circle of radius 1 centred at the origin. Point (cos θ, sin θ) for angle θ. Key values: sin(0)=0, sin(π/2)=1, sin(π)=0. The unit circle unifies geometry with analysis.' },
          { name:'Trig Identities', body:'Fundamental: <code>sin²θ + cos²θ = 1</code>. This comes directly from Pythagoras on the unit circle. From it: 1+tan²θ=sec²θ and 1+cot²θ=csc²θ.' },
          { name:'Waves & Periodicity', body:'y = A·sin(Bx + C) + D. <strong>A</strong>=amplitude, <strong>2π/B</strong>=period, <strong>C/B</strong>=phase shift, <strong>D</strong>=vertical shift. All oscillations in physics and signals follow this form.' },
        ],
        formulas:['sin²θ + cos²θ = 1','sin(A±B) = sinA·cosB ± cosA·sinB','cos(2θ) = cos²θ − sin²θ'],
        trick:'Remember the unit circle: the coordinates (cos θ, sin θ). At 30°,45°,60° think: √3/2, √2/2, 1/2 for cos, reversed for sin.',
        quiz:[
          { q:'sin(90°) = ?', opts:['0','0.5','1','√2/2'], ans:2 },
          { q:'sin²θ + cos²θ = ?', opts:['0','2','1','depends on θ'], ans:2 },
          { q:'Period of y=sin(2x) is:', opts:['2π','π','4π','π/2'], ans:1 },
        ]
      },
      {
        id:'logic', icon:'⚙️', title:'Logic & Proof', color:'var(--cs)',
        fields:['cs','ai'], xp:65, requires:['algebra_basics'],
        desc:'Propositional logic, truth tables, and mathematical reasoning.',

        concepts:[
          { name:'Shannon Entropy', body:'H(X) = −Σ p(x)log₂p(x). Measures average information/surprise in a distribution. High entropy = uniform (unpredictable). Low entropy = concentrated (predictable). Used as loss in classification: cross-entropy.' },
          { name:'Cross-Entropy Loss', body:'H(p,q) = −Σ p(x)log q(x). Measures how well distribution q approximates true distribution p. <strong>Classification loss = cross-entropy between one-hot labels and softmax outputs.</strong> Minimizing it = MLE.' },
          { name:'KL Divergence', body:'KL(p||q) = Σ p(x)log(p(x)/q(x)). Always ≥0 (Gibbs inequality). Not symmetric. Measures how much information is lost when using q to approximate p. Used in VAEs, RL (PPO), and Bayesian ML.' },
          { name:'Mutual Information', body:'I(X;Y) = H(X) − H(X|Y). Measures shared information between X and Y. I(X;Y)=0 iff X,Y independent. Used in feature selection, representation learning, and the Information Bottleneck framework.' },

          { name:'Jacobian Matrix', body:'J = ∂(f₁,…,fₘ)/∂(x₁,…,xₙ) — the matrix of all partial derivatives for a vector-valued function. Shape: m×n. In neural networks, the Jacobian of the loss with respect to weights is computed during <strong>backpropagation</strong>.' },
          { name:'Hessian Matrix', body:'H = [∂²f/∂xᵢ∂xⱼ] — second-order partial derivatives. Symmetric for smooth f (Schwarz theorem). At a critical point: H positive definite → local min, H negative definite → local max, indefinite → saddle.' },
          { name:'Chain Rule (Vector)', body:'For composed functions: d/dt[f(g(t))] = ∇f(g(t))·g\'(t). In neural networks with L layers: ∂L/∂W₁ = (∂L/∂aL)·(∂aL/∂aL₋₁)·…·(∂a₂/∂W₁). This IS backpropagation.' },
        ],
        formulas:['Gradient: ∇f = [∂f/∂x₁, …, ∂f/∂xₙ]','Jacobian: Jᵢⱼ = ∂fᵢ/∂xⱼ','Hessian: Hᵢⱼ = ∂²f/∂xᵢ∂xⱼ'],
        trick:'The gradient always points toward maximum increase. Gradient descent negates it to go downhill — minimizing loss.',
        quiz:[
          { q:'∂/∂x [x²y³] = ?', opts:['2xy³','3x²y²','2x²y²','xy³'], ans:0 },
          { q:'The gradient ∇f points toward:', opts:['minimum','zero','steepest ascent','saddle point'], ans:2 },

      {

          { name:'Linear Regression', body:'Model: ŷ = Xw + b. Loss: MSE = (1/n)Σ(yᵢ−ŷᵢ)². Closed form: w* = (XᵀX)⁻¹Xᵀy (Normal Equations). Geometric interpretation: w* is the projection of y onto the column space of X.' },
          { name:'Ridge & Lasso', body:'Ridge (L2 reg): minimize ||y−Xw||² + λ||w||². Shrinks all weights smoothly. Lasso (L1 reg): ||w||₁ penalty produces <strong>sparse solutions</strong> (some weights → 0). Lasso does automatic feature selection.' },

          { name:'Softmax for Multi-class', body:'σ(z)ᵢ = eᶻⁱ/Σⱼeᶻʲ. Converts logits to probabilities (sum=1). Combined with cross-entropy loss: the standard recipe for any classification neural network output layer.' },
        ],
        formulas:['Normal eq: w* = (XᵀX)⁻¹Xᵀy','Sigmoid: σ(z) = 1/(1+e⁻ᶻ)','Softmax: p(yᵢ) = exp(zᵢ)/Σⱼ exp(zⱼ)'],

        quiz:[

          { name:'Backpropagation', body:'Apply chain rule iteratively from output to input. δ^L = ∇L ⊙ σ\'(z^L). δ^l = (W^(l+1))ᵀ δ^(l+1) ⊙ σ\'(z^l). ∂L/∂W^l = δ^l (a^(l−1))ᵀ. This propagates the "blame" for error back through layers.' },

        quiz:[
          { q:'Backprop computes gradients using:', opts:['finite differences','chain rule','integration','SVD'], ans:1 },
          { q:'Vanishing gradient is solved by:', opts:['more data','ReLU activation','bigger batches','lower LR'], ans:1 },

// ══════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════
let completed = JSON.parse(localStorage.getItem('mathTreeCompleted') || '[]');
let xp = parseInt(localStorage.getItem('mathTreeXP') || '0');
let activeFilter = 'all';
let activeNode = null;
let quizAnswered = [];

function isUnlocked(node) {
  return node.requires.every(r => completed.includes(r));
}

function saveState() {
  try {
    localStorage.setItem('mathTreeCompleted', JSON.stringify(completed));
    localStorage.setItem('mathTreeXP', String(xp));
  } catch(e) {}
}

// ══════════════════════════════════════════
//  RENDER TREE
// ══════════════════════════════════════════
function renderTree() {
  const panel = document.getElementById('tree-panel');
  panel.innerHTML = '';

  const totalNodes = TREE.reduce((s,c) => s + c.nodes.length, 0);
  const doneCount = TREE.reduce((s,c) => s + c.nodes.filter(n => completed.includes(n.id)).length, 0);
  document.getElementById('prog-bar').style.width = (doneCount/totalNodes*100) + '%';
  document.getElementById('xp-count').textContent = xp;

  TREE.forEach((chapter, ci) => {
    // filter
    const visible = chapter.nodes.filter(n => {
      if (activeFilter === 'all') return true;
      return n.fields.includes(activeFilter);
    });
    if (!visible.length) return;

    // Chapter label
    const lbl = document.createElement('div');
    lbl.className = 'chapter-label';
    lbl.textContent = chapter.chapter;
    panel.appendChild(lbl);

    // Connector from previous
    if (ci > 0) {
      const conn = document.createElement('div');
      conn.className = 'connector' + (ci > 0 ? ' lit' : '');
      conn.style.height = '20px';
      conn.style.setProperty('--c', visible[0]?.color || 'var(--stem)');
      panel.appendChild(conn);
    }

    visible.forEach((node, ni) => {
      const unlocked = isUnlocked(node);
      const done = completed.includes(node.id);

      // connector before each node (except first)
      if (ni > 0) {
        const conn = document.createElement('div');
        conn.className = 'connector' + (done ? ' lit' : '');
        conn.style.height = '12px';
        conn.style.setProperty('--c', node.color);
        panel.appendChild(conn);
      }

      const row = document.createElement('div');
      row.className = 'node-row';

      const nd = document.createElement('div');
      nd.className = 'node' + (done ? ' done' : (!unlocked ? ' locked' : '')) + (activeNode === node.id ? ' active' : '');
      nd.style.setProperty('--c', node.color);
      nd.dataset.id = node.id;

      const fieldBadges = node.fields.map(f => `<span class="badge badge-${f}">${f.toUpperCase()}</span>`).join('');
      const statusText = done ? '✓ COMPLETE' : (!unlocked ? '🔒 LOCKED' : '▶ READY');
      const statusClass = done ? 'status-done' : (!unlocked ? 'status-locked' : 'status-ready');

      nd.innerHTML = `
        <div class="node-top">
          <div class="node-icon" style="--c:${node.color}">${node.icon}</div>
          <div class="node-badges">${fieldBadges}</div>
        </div>
        <div class="node-title">${node.title}</div>
        <div class="node-desc">${node.desc}</div>
        <div class="node-footer">
          <span class="node-xp">+${node.xp} XP</span>
          <span class="node-status ${statusClass}">${statusText}</span>
        </div>
      `;

      if (unlocked || done) {
        nd.addEventListener('click', () => openLesson(node));
      } else {
        nd.addEventListener('click', () => showLockedMsg(node));
      }

      row.appendChild(nd);
      panel.appendChild(row);

      // connector after node
      const conn2 = document.createElement('div');
      conn2.className = 'connector' + (done ? ' lit' : '');
      conn2.style.height = '12px';
      conn2.style.setProperty('--c', node.color);
      panel.appendChild(conn2);
    });
  });
}

// ══════════════════════════════════════════
//  LESSON PANEL
// ══════════════════════════════════════════
function openLesson(node) {
  activeNode = node.id;
  quizAnswered = new Array(node.quiz.length).fill(null);
  renderTree();

  document.getElementById('lc-title').textContent = node.title;
  document.getElementById('lesson-panel').style.setProperty('--lc', node.color);

  const inner = document.getElementById('lesson-inner');
  const done = completed.includes(node.id);

  // Build quiz HTML
  const quizHTML = node.quiz.map((q, qi) => `
    <div class="quiz-q" id="qq-${qi}">
      <div class="quiz-q-text">Q${qi+1}. ${q.q}</div>
      <div class="quiz-options">
        ${q.opts.map((o, oi) => `<button class="quiz-opt" onclick="answerQuiz('${node.id}',${qi},${oi},${q.ans})" id="qopt-${qi}-${oi}">${o}</button>`).join('')}
      </div>
    </div>
  `).join('');

  inner.innerHTML = `
    <div class="l-hero" style="--lc:${node.color}">
      <span class="l-hero-icon">${node.icon}</span>
      <div class="l-hero-title">${node.title}</div>
      <div class="l-hero-desc">${node.desc}</div>
    </div>

    <div class="l-section">
      <div class="l-section-title">Core Concepts</div>
      ${node.concepts.map((c, i) => `
        <div class="concept-block" style="--lc:${node.color}">
          <div class="concept-head">
            <span class="concept-num">${String(i+1).padStart(2,'0')}</span>
            <span class="concept-name">${c.name}</span>
          </div>
          <div class="concept-body">${c.body}</div>
        </div>
      `).join('')}
    </div>

    <div class="l-section">
      <div class="l-section-title">Key Formulas</div>
      <div class="formula-box" style="--lc:${node.color}">
        <span class="flabel">Reference</span>
        ${node.formulas.join('<br>')}
      </div>
    </div>

    <div class="l-section">
      <div class="l-section-title">Mental Shortcut</div>
      <div class="trick-pill">
        <span class="trick-emoji">⚡</span>
        <span>${node.trick}</span>
      </div>
    </div>

    <div class="l-section quiz-section">
      <div class="l-section-title">Knowledge Check — ${node.quiz.length} Questions</div>
      ${quizHTML}
      <div class="quiz-result" id="quiz-result">
        <span class="quiz-result-icon" id="qr-icon">🏆</span>
        <div class="quiz-result-text" id="qr-text">Well done!</div>
        <div class="quiz-result-sub" id="qr-sub">You passed!</div>
      </div>
      <button class="complete-btn ${done ? 'show' : ''}" id="complete-btn" style="background:${node.color}" onclick="completeNode('${node.id}', ${node.xp})">
        ${done ? '✓ Completed — Review Anytime' : '✓ Mark Complete & Earn XP'}
      </button>
    </div>
  `;

  document.getElementById('lesson-panel').classList.add('open');
}

function closeLesson() {
  document.getElementById('lesson-panel').classList.remove('open');
  activeNode = null;
  renderTree();
}

// ══════════════════════════════════════════
//  QUIZ
// ══════════════════════════════════════════
function answerQuiz(nodeId, qi, chosen, correct) {
  if (quizAnswered[qi] !== null) return;
  quizAnswered[qi] = chosen;

  const opts = document.querySelectorAll(`#qq-${qi} .quiz-opt`);
  opts.forEach((o, i) => {
    o.setAttribute('disabled', true);
    if (i === correct) o.classList.add('correct');
    else if (i === chosen && chosen !== correct) o.classList.add('wrong');
  });

  // Check if all answered
  if (quizAnswered.every(a => a !== null)) {
    const score = quizAnswered.filter((a,i) => {
      const node = findNode(nodeId);
      return a === node.quiz[i].ans;
    }).length;
    const total = quizAnswered.length;
    const pass = score >= Math.ceil(total * 0.67);

    const qr = document.getElementById('quiz-result');
    qr.className = 'quiz-result show ' + (pass ? 'pass' : 'fail');
    document.getElementById('qr-icon').textContent = pass ? '🎯' : '📚';
    document.getElementById('qr-text').textContent = pass ? `${score}/${total} — Great!` : `${score}/${total} — Review & retry`;
    document.getElementById('qr-sub').textContent = pass ? 'You can now mark this lesson complete.' : 'Study the concepts above and try again.';

    if (pass) {
      document.getElementById('complete-btn').classList.add('show');
    }
  }
}

function findNode(id) {
  for (const ch of TREE) {
    const n = ch.nodes.find(n => n.id === id);
    if (n) return n;
  }
  return null;
}

// ══════════════════════════════════════════
//  COMPLETE NODE
// ══════════════════════════════════════════
function completeNode(id, earnedXp) {
  if (!completed.includes(id)) {
    completed.push(id);
    xp += earnedXp;
    saveState();
    showXpToast(`+${earnedXp} XP`);
  }
  document.getElementById('complete-btn').textContent = '✓ Completed — Review Anytime';
  renderTree();
}

function showXpToast(msg) {
  const t = document.getElementById('xp-toast');
  t.textContent = '⚡ ' + msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function showLockedMsg(node) {
  const needed = node.requires.filter(r => !completed.includes(r));
  const names = needed.map(id => findNode(id)?.title || id).join(', ');
  showXpToast(`🔒 Complete first: ${names}`);
}

// ══════════════════════════════════════════
//  FILTER
// ══════════════════════════════════════════
function setFilter(f, btn) {
  activeFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderTree();
}

// ══════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════
renderTree();
</script>
